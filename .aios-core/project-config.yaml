# AIOS Project Configuration (Level 2)
# Project-specific settings shared across the team.

project:
  type: greenfield
  installedAt: "2026-02-26T15:30:34.005Z"
  version: 2.1.0
documentation_paths:
  qa_dir: docs/qa
  prd_file: docs/prd.md
  prd_version: v4
  prd_sharded: true
  prd_sharded_location: docs/prd
  architecture_file: docs/architecture.md
  architecture_version: v4
  architecture_sharded: true
  architecture_sharded_location: docs/architecture
  stories_dir: docs/stories
  dev_debug_log: .ai/debug-log.md
  slash_prefix: AIOS
  custom_technical_documents: null
  dev_load_always_files:
    - docs/framework/coding-standards.md
    - docs/framework/tech-stack.md
    - docs/framework/source-tree.md
  dev_load_always_files_fallback:
    - docs/architecture/padroes-de-codigo.md
    - docs/architecture/pilha-tecnologica.md
    - docs/architecture/arvore-de-origem.md
logging:
  decision_logging:
    enabled: true
    async: true
    location: .ai/
    indexFile: decision-logs-index.md
    format: adr
    performance:
      maxOverhead: 50
  project_status:
    enabled: true
    autoLoadOnAgentActivation: true
    showInGreeting: true
    cacheTimeSeconds: 60
    components:
      gitBranch: true
      gitStatus: true
      recentWork: true
      currentEpic: true
      currentStory: true
    statusFile: .aios/project-status.yaml
    maxModifiedFiles: 5
    maxRecentCommits: 2
  agent_identity:
    greeting:
      contextDetection: true
      sessionDetection: hybrid
      workflowDetection: hardcoded
      performance:
        gitCheckCache: true
        gitCheckTTL: 300
